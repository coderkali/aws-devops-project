apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-orders
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-orders
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-orders
    spec:
      containers:
      - name: orders
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: 8080
        env:
        - name: DB_HOST
          value: {{ .Values.db.host | quote }}
        - name: DB_NAME
          value: {{ .Values.db.name | quote }}
        - name: DB_PORT
          value: {{ .Values.db.port | quote }}
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: password
        - name: MESSAGING_PROVIDER
          value: "sqs"
        - name: MESSAGING_SQS_QUEUE_URL
          value: {{ .Values.messaging.queueUrl | quote }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}