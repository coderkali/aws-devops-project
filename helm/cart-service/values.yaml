replicaCount: 1

image:
  repository: public.ecr.aws/aws-containers/retail-store-sample-cart
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false

dynamodb:
  tableName: devops-carts
  region: us-east-1

resources:
  requests:
    cpu: 128m
    memory: 256Mi
  limits:
    cpu: 256m
    memory: 512Mi