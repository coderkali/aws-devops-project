apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-catalog
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-catalog
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-catalog
    spec:
      containers:
      - name: catalog
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: 8080
        env:
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: password
        - name: DB_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: {{ .Release.Name }}-catalog-config
              key: DB_ENDPOINT
        - name: DB_READ_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: {{ .Release.Name }}-catalog-config
              key: DB_READ_ENDPOINT
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: {{ .Release.Name }}-catalog-config
              key: DB_NAME
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
