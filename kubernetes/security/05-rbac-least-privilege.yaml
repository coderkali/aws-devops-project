# Phase 11: RBAC - Least Privilege Access Control
# Each service account gets only the permissions it needs

---
# Catalog Service - Read-only access to ConfigMaps
apiVersion: v1
kind: ServiceAccount
metadata:
  name: catalog-sa
  namespace: retail-store

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: catalog-role
  namespace: retail-store
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
  resourceNames: ["db-credentials"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: catalog-rolebinding
  namespace: retail-store
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: catalog-role
subjects:
- kind: ServiceAccount
  name: catalog-sa
  namespace: retail-store

